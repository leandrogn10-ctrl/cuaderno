<!DOCTYPE html>
<!-- Cuaderno v4 deploy-gate harness: drives the Session Runner in an iframe; writes PASS/FAIL lines into #out.
     Run: python3 -m http.server → chrome --headless --virtual-time-budget=40000 --dump-dom http://localhost:PORT/test-harness.html
     exdb is tested WITHOUT network by pre-seeding localStorage['cuaderno.exdb.v1']. -->
<html>
<head><meta charset="utf-8"></head>
<body>
<pre id="out"></pre>
<iframe id="f" src="about:blank" style="width:400px;height:800px"></iframe>
<script>
'use strict';
const out = [];
function log(name, ok, extra) { out.push(`HARNESS: ${ok ? 'PASS' : 'FAIL'} >> ${name}${extra ? ' >> ' + extra : ''}`); render(); }
function render() { document.getElementById('out').textContent = out.join('\n'); }
const f = document.getElementById('f');
const sleep = ms => new Promise(r => setTimeout(r, ms));
function W() { return f.contentWindow; }
function D() { return f.contentDocument; }
function q(sel) { return D().querySelector(sel); }
function state() { return JSON.parse(W().localStorage.getItem('cuaderno.v1')); }
function aw() { return state().activeWorkout; }
const GIF = 'data:image/gif;base64,R0lGODlhAQABAIAAAMLCwgAAACH5BAAAAAAALAAAAAABAAEAAAICRAEAOw==';
function seedExdb() {
  const names = ['squat', 'bench press', 'deadlift', 'overhead press', 'barbell row', 'pull up'];
  const map = {};
  for (const n of names) map[n] = { imgs: [GIF, GIF], instructions: ['Step one.', 'Step two.'] };
  W().localStorage.setItem('cuaderno.exdb.v2', JSON.stringify(map));
}
async function loadApp() {
  f.src = 'index.html';
  await new Promise(r => f.onload = r);
  await sleep(600);
}

(async () => {
  try {
    localStorage.clear();
    await loadApp();
    seedExdb();   // pre-seed exdb cache (no network in tests); takes effect on next render

    // ── boot ──
    log('boot: HOME renders START WORKOUT', !!q('[data-act="start-workout"]'));
    log('boot: week strip present', !!q('.week-strip'));
    log('boot: no plan card on fresh state', !q('.plan-card'));

    // ── runner: fresh start → brief (+auto picker) → LET'S GO → count → set ──
    q('[data-act="start-workout"]').click();                       // TAP 1
    await sleep(400);
    log('runner: brief mode on start', aw()?.mode === 'brief');
    const pick = q('#picker-list [data-act="pick-exercise"]');
    log('runner: picker auto-opens when session empty', !!pick);
    pick.click();
    await sleep(400);
    log('brief: exercise row listed', !!q('.brief-row'));
    log('brief: exdb thumb upgrades the row', !!q('.brief-row img.thumb'));
    log('brief: LET\'S GO present', !!q('[data-act="lets-go"]'));
    q('[data-act="lets-go"]').click();                             // TAP 2
    await sleep(300);
    log('count: 3-2-1 screen renders', aw().mode === 'count' && !!q('#count-num'));

    // reload mid-count → countStartedAt resumes/advances correctly
    await loadApp();
    log('count: mode survives reload', D().body.dataset.view === 'workout' && ['count', 'set'].includes(aw().mode));
    await sleep(4600); W().wkTick(); await sleep(200);             // let 3-2-1-GO elapse (manual tick: see plan-day note)
    log('count → set: auto-advanced', aw().mode === 'set' && !!q('.done-set-btn'));
    log('set: media animation (exdb) present', !!q('#media-flip'));
    log('set: ⓘ form steps available', !!q('[data-act="toggle-form"]'));
    log('set: SET 1/N progress shown', /SET 1\//.test(q('.set-progress .sp')?.textContent || ''));
    log('set: weight input prefilled', (q('.set-table input[data-fld="w"]')?.value || '').length > 0);

    // reload mid-set → same screen, same cursor
    const cur0 = JSON.stringify(aw().cursor);
    await loadApp();
    log('set: mode+cursor survive reload', aw().mode === 'set' && JSON.stringify(aw().cursor) === cur0);

    // ── DONE SET → rest → skip → set 2 ──
    q('[data-act="done-set"]').click();                            // TAP 3 — first set logged
    await sleep(400);
    const st1 = state();
    log('3-tap prime directive: first set logged', st1.sessions[0]?.entries[0]?.sets.length === 1, JSON.stringify(st1.sessions[0]?.entries[0]?.sets[0] || null));
    log('rest: full-screen countdown', aw().mode === 'rest' && !!q('#rest-big'));
    log('rest: UP NEXT card', !!q('.upnext-card') && /SET 2\//.test(q('.upnext-card .d')?.textContent || ''));
    q('[data-act="rest-skip"]').click();
    await sleep(300);
    log('rest SKIP → next set screen', aw().mode === 'set' && /SET 2\//.test(q('.set-progress .sp')?.textContent || ''));

    // ── skip set → rest → skip → set 3 → DONE SET (last) → summary ──
    q('[data-act="skip-set"]').click();
    await sleep(300);
    log('skip set: row marked skipped, no log', aw().exercises[0].rows[1].skipped === true && state().sessions[0].entries[0].sets.length === 1);
    log('skip set → rest screen', aw().mode === 'rest');
    q('[data-act="rest-skip"]').click();
    await sleep(300);
    log('set 3 reached', /SET 3\//.test(q('.set-progress .sp')?.textContent || ''));
    W().confirm = () => true;
    q('[data-act="done-set"]').click();                            // last undone row → finish
    await sleep(500);
    log('last set → summary', D().body.dataset.view === 'summary' && !!q('.sum-hero'));
    const st2 = state();
    log('finish: 2 logged sets (skipped excluded), endedAt set', st2.sessions[0].entries[0].sets.length === 2 && !!st2.sessions[0].endedAt && st2.activeWorkout === null);
    log('summary: debrief button offered', !!q('[data-act="debrief-session"]'));
    q('[data-act="goto-home"]').click();
    await sleep(300);
    log('home feed shows the workout', D().body.dataset.view === 'home' && !!q('[data-act="open-session"]'));
    log('home: streak strip shows n/goal', /\d+\/\d+/.test(q('.week-strip .l')?.textContent || ''), q('.week-strip .l')?.textContent);

    // ── debrief: home prompt → speak/type → saved on the session ──
    log('home: undebriefed session prompts 🎙', !!q('[data-act="debrief-session"]'));
    q('[data-act="debrief-session"]').click();
    await sleep(300);
    log('debrief modal opens', D().getElementById('debrief-modal').open);
    D().getElementById('db-text').value = 'Felt strong, slept 8h, slight left shoulder tweak on the last set.';
    D().getElementById('db-send').click();
    await sleep(400);
    const dbS = state().sessions.find(s => s.debrief);
    log('debrief saved to the session (no API key → stored anyway)', !!dbS && dbS.debrief.text.includes('shoulder'));
    log('home: debrief prompt cleared after saving', !q('[data-act="debrief-session"]'));

    // ── edit round-trip (new workout, resumed same day) ──
    q('[data-act="start-workout"]').click();
    await sleep(400);
    log('restart same day: brief again, done rows folded', aw().mode === 'brief' && aw().exercises[0].rows.filter(r => r.done).length === 2);
    q('[data-act="edit-session"]').click();
    await sleep(300);
    log('edit mode: table player renders', aw().mode === 'edit' && !!q('.ov-strip') && !!q('.player-nav'));
    q('[data-act="resume-runner"]').click();
    await sleep(300);
    log('resume runner from edit', ['set', 'edit'].includes(aw().mode), 'mode=' + aw().mode);   // 'edit' only if zero undone rows
    W().confirm = () => true;
    q('[data-act="cancel-workout"]').click();
    await sleep(300);
    log('cancel returns home (logged sets kept)', D().body.dataset.view === 'home' && state().sessions[0].entries[0].sets.length === 2);

    // ── coach chips ──
    W().nav('coach');
    await sleep(300);
    log('coach: full-screen overlay with inner scroller', !!q('.coach-wrap') && getComputedStyle(q('.coach-wrap')).position === 'fixed');
    log('coach: bottom tabs STAY visible (exit path)', getComputedStyle(q('#bottom-tabs')).display !== 'none');
    log('coach: chips render', D().querySelectorAll('#coach-chips [data-chip]').length === 5);
    log('coach: dock input present', !!q('#coach-dock #coach-text'));
    log('offline: prefetch fn + settings button wired', typeof W().offlinePrefetch === 'function' && !!D().getElementById('offline-prep-btn'));
    q('#coach-chips [data-chip="0"]').click();
    await sleep(200);
    log('coach: chip stuffs a real prompt (send blocked w/o key)', (q('#coach-text').value || '').toLowerCase().includes('program'));

    // ── plan lifecycle through the runner ──
    W().acceptPlan({ type: 'plan', name: 'TEST UL', days: [
      { name: 'UPPER', exercises: [{ name: 'Bench Press', sets: 2, reps: 5, startWeight: 100, videoQuery: 'bench' }] },
      { name: 'LOWER', exercises: [{ name: 'Squat', sets: 2, reps: 5, videoQuery: 'squat' }] },
    ]});
    await sleep(400);
    log('plan accepted: card on home', !!q('.plan-card'));
    q('[data-act="start-workout"]').click();
    await sleep(400);
    log('plan day: brief shows plan context', aw().mode === 'brief' && /UPPER/.test(q('.brief-sub')?.textContent || ''));
    q('[data-act="lets-go"]').click();
    await sleep(4800); W().wkTick(); await sleep(200);             // 3-2-1-GO (intervals don't fire in headless virtual time — drive the tick)
    log('plan day: set screen @ target weight', aw().mode === 'set' && q('.set-table input[data-fld="w"]')?.value === '100',
        `mode=${aw()?.mode} w=${q('.set-table input[data-fld="w"]')?.value}`);
    q('[data-act="done-set"]').click(); await sleep(300);
    q('[data-act="rest-skip"]')?.click(); await sleep(300);
    q('[data-act="done-set"]').click(); await sleep(500);
    log('plan day: finished via runner → summary', D().body.dataset.view === 'summary');
    log('plan cursor advanced', state().plan.cursor === 1, 'cursor=' + state().plan.cursor);
    q('[data-act="goto-home"]').click(); await sleep(300);

    // ── timed sets: plank with a hold countdown (+ schedule → NEXT line) ──
    W().acceptPlan({ type: 'plan', name: 'TEST TIMED', schedule: ['mon', 'tue', 'thu', 'fri'], days: [
      { name: 'CORE', exercises: [{ name: 'Plank', sets: 1, seconds: 45, videoQuery: 'plank' }] },
    ]});
    await sleep(400);
    log('timed: plan card shows 1×45s', /1×45s/.test(q('.plan-card')?.textContent || ''), JSON.stringify((q('.plan-card')?.textContent || '').slice(0, 120)));
    log('schedule: parsed to JS weekdays', JSON.stringify(state().plan.schedule) === '[1,2,4,5]', JSON.stringify(state().plan.schedule));
    log('schedule: home shows NEXT line', /NEXT: (TODAY|TOMORROW|MONDAY|TUESDAY|THURSDAY|FRIDAY) · /.test(q('.plan-next')?.textContent || ''), q('.plan-next')?.textContent);
    q('[data-act="start-workout"]').click();
    await sleep(400);
    log('timed: brief row shows 45s target', /45s/.test(q('.brief-row .t')?.textContent || ''));
    q('[data-act="lets-go"]').click();
    await sleep(4800); W().wkTick(); await sleep(200);
    log('timed: set screen offers START HOLD', aw().mode === 'set' && !!q('[data-act="start-hold"]'), 'mode=' + aw()?.mode);
    log('timed: SEC input replaces reps', !!q('input[data-fld="s"]'));
    q('[data-act="start-hold"]').click();
    await sleep(300);
    log('timed: hold armed, countdown button live', !!aw().hold && !!q('[data-act="finish-hold"]'));
    await loadApp();   // mid-hold reload → countdown survives
    log('timed: hold survives reload', !!aw().hold && !!q('[data-act="finish-hold"]'));
    await sleep(1200);
    q('[data-act="finish-hold"]').click();   // end early → logs actual seconds held
    await sleep(500);
    const stT = state();
    const plankEx = stT.exercises.find(x => x.name === 'Plank');
    const plankEn = stT.sessions[0].entries.find(e => e.exerciseId === plankEx?.id);
    log('timed: hold logged as seconds (no reps, no NaN volume)',
        !!plankEn && plankEn.sets.length === 1 && plankEn.sets[0].sec >= 1 && plankEn.sets[0].r === undefined && Number.isFinite(W().sessionVol(stT.sessions[0])),
        JSON.stringify(plankEn?.sets[0] || null));
    log('timed: last set → summary', D().body.dataset.view === 'summary');
    q('[data-act="goto-home"]').click(); await sleep(300);

    // ── check-in: any-time "how do I feel" log from home ──
    log('checkin: home offers ♥ check-in', !!q('[data-act="log-checkin"]'));
    q('[data-act="log-checkin"]').click();
    await sleep(300);
    log('checkin: modal opens in check-in mode', D().getElementById('debrief-modal').open && D().getElementById('db-title').textContent === 'Check-in');
    log('checkin: mic language toggle present (en-US default)', !!q('#mic-lang-seg') && state().settings.micLang === 'en-US');
    D().getElementById('db-text').value = 'Left shoulder is sore from yesterday, everything else fine.';
    D().getElementById('db-send').click();
    await sleep(400);
    log('checkin: saved to state (no API key → stored anyway)', state().checkins?.length === 1 && state().checkins[0].text.includes('shoulder'));
    log('checkin: home daylog shows it', /check-in/.test(q('.daylog')?.textContent || ''), (q('.daylog')?.textContent || '').slice(0, 80));

    // ── other screens intact ──
    W().nav('history'); await sleep(300);
    log('history lists sessions', D().querySelectorAll('[data-act="open-session"]').length >= 1);
    W().nav('exercises'); await sleep(300);
    const exRow = q('[data-act="open-exercise"]');
    log('exercises screen lists movements (with thumbs)', !!exRow && !!q('img.thumb'));
    exRow.click(); await sleep(400);
    log('exercise detail: records + chart', !!q('.rec-grid') && !!q('#cv-e1rm'));

    log('ALL DONE', true);
  } catch (e) {
    log('EXCEPTION', false, e.message + ' @ ' + (e.stack || '').split('\n')[1]);
  }
})();
</script>
</body>
</html>
